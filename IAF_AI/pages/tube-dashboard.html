<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tube Dashboard — IAF</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Press+Start+2P&display=swap');

  :root {
    --bg-deep: #060a10;
    --bg-main: #0a0f16;
    --bg-card: #0e141c;
    --bg-panel: #111820;
    --bg-log: #080c12;
    --border: #1a2533;
    --border-hover: #2a3a55;
    --text: #d0d6e0;
    --text-mid: #8899aa;
    --text-bright: #f0f2f5;
    --text-label: #66aacc;
    --green: #00e676;
    --green-dim: #00e67633;
    --cyan: #26c6da;
    --cyan-dim: #26c6da33;
    --yellow: #f0c040;
    --yellow-dim: #f0c04033;
    --red: #ef5350;
    --red-dim: #ef535033;
    --purple: #ce93d8;
    --purple-dim: #ab47bc33;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'IBM Plex Mono', monospace;
    background: var(--bg-deep);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
    padding-bottom: 40px;
  }

  .header {
    background: var(--bg-main);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header a {
    color: var(--text-mid);
    text-decoration: none;
    font-size: 13px;
    transition: color 0.2s;
  }
  .header a:hover { color: var(--text-bright); }
  .header h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: var(--green);
    letter-spacing: 2px;
  }
  .brand-link { display: flex; align-items: center; gap: 6px; }
  .brand-link::before { content: '▰▰'; font-size: 10px; color: var(--green); }

  .container { padding: 20px 24px; }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .tube-count { font-size: 13px; color: var(--text); }
  .tube-count strong { color: var(--yellow); }
  .live-indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-mid); }
  .live-dot {
    width: 7px; height: 7px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s ease infinite;
    box-shadow: 0 0 6px var(--green-dim);
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.25;} }

  .tube-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .tube-card:hover { border-color: var(--border-hover); }
  .tube-card.is-running { border-left: 3px solid var(--yellow); }
  .tube-card.is-idle { border-left: 3px solid var(--green); }
  .tube-card.is-disabled { border-left: 3px solid #444; opacity: 0.65; }

  .tube-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; cursor: pointer; user-select: none;
  }
  .tube-row:hover { background: var(--bg-panel); }
  .tube-identity { display: flex; align-items: center; gap: 14px; }
  .tube-id { font-size: 15px; font-weight: 600; color: var(--text-bright); }

  .badge {
    font-size: 10px; padding: 2px 10px; border-radius: 2px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px;
  }
  .badge-running { background: var(--yellow-dim); color: var(--yellow); border: 1px solid var(--yellow); }
  .badge-idle { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
  .badge-disabled { background: #33333366; color: #888; border: 1px solid #555; }

  .tube-triggers-brief { font-size: 12px; color: var(--text-mid); }
  .tube-actions { display: flex; align-items: center; gap: 10px; }

  .btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; padding: 6px 14px;
    border: 1px solid var(--border); border-radius: 3px;
    background: var(--bg-panel); color: var(--text);
    cursor: pointer; transition: all 0.15s;
  }
  .btn:hover { background: var(--bg-card); border-color: var(--border-hover); color: var(--text-bright); }
  .btn-fire { border-color: var(--yellow); color: var(--yellow); font-weight: 600; }
  .btn-fire:hover { background: var(--yellow-dim); }
  .btn-fire:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-fire.firing { animation: flash 0.5s ease; }
  @keyframes flash { 0%{background:var(--yellow);color:#000;} 100%{background:var(--yellow-dim);color:var(--yellow);} }

  .expand-icon { font-size: 11px; color: var(--text-mid); transition: transform 0.2s; }
  .tube-card.expanded .expand-icon { transform: rotate(90deg); }

  .tube-detail { display: none; border-top: 1px solid var(--border); }
  .tube-card.expanded .tube-detail { display: flex; }

  .detail-left {
    width: 400px; min-width: 400px;
    padding: 20px; border-right: 1px solid var(--border);
    position: relative; padding-bottom: 60px;
  }
  .detail-right { flex: 1; padding: 20px; display: flex; flex-direction: column; }

  .section-title {
    font-size: 12px; font-weight: 600; color: var(--green);
    text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px;
  }

  .config-grid {
    display: grid; grid-template-columns: auto 1fr;
    gap: 6px 14px; font-size: 13px; margin-bottom: 20px;
  }
  .config-label { color: var(--text-label); text-align: right; white-space: nowrap; }
  .config-value { color: var(--text-bright); }
  .config-value.yes { color: var(--green); }
  .config-value.no { color: var(--red); }

  .step-card {
    background: var(--bg-deep); border: 1px solid var(--border);
    border-radius: 3px; padding: 10px 14px; margin-bottom: 8px;
  }
  .step-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .step-num { font-size: 11px; color: var(--text-mid); font-weight: 600; min-width: 20px; }
  .step-type-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 2px;
    text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
  }
  .step-type-agent { background: var(--cyan-dim); color: var(--cyan); border: 1px solid var(--cyan); }
  .step-type-dispatch { background: var(--purple-dim); color: var(--purple); border: 1px solid var(--purple); }
  .step-type-tube { background: var(--yellow-dim); color: var(--yellow); border: 1px solid var(--yellow); }
  .step-target-name { font-size: 13px; color: var(--text-bright); font-weight: 500; }

  .step-details { font-size: 12px; margin-left: 30px; }
  .step-detail-row { display: flex; gap: 8px; padding: 2px 0; }
  .step-detail-key { color: var(--text-label); min-width: 70px; }
  .step-detail-val { color: var(--text-bright); word-break: break-all; }

  .status-bar {
    position: absolute; bottom: 14px; left: 20px; right: 20px;
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 600; padding: 8px 14px;
    border-radius: 3px; background: var(--bg-deep); border: 1px solid var(--border);
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; }
  .status-dot.running { background: var(--yellow); box-shadow: 0 0 8px var(--yellow-dim); animation: pulse 1.5s ease infinite; }
  .status-dot.idle { background: var(--green); box-shadow: 0 0 6px var(--green-dim); }
  .status-text-running { color: var(--yellow); }
  .status-text-idle { color: var(--green); }

  .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .btn-clear { border-color: var(--red); color: var(--red); font-size: 11px; padding: 4px 12px; }
  .btn-clear:hover { background: var(--red-dim); }

  .log-scroll {
    flex: 1; overflow-y: auto; max-height: 400px;
    background: var(--bg-log); border: 1px solid var(--border);
    border-radius: 3px; padding: 10px;
  }
  .log-scroll::-webkit-scrollbar { width: 6px; }
  .log-scroll::-webkit-scrollbar-track { background: transparent; }
  .log-scroll::-webkit-scrollbar-thumb { background: #2a3a55; border-radius: 3px; }

  .log-entry {
    padding: 6px 8px; margin-bottom: 3px; border-radius: 2px;
    font-size: 12px; line-height: 1.5; border-left: 3px solid transparent;
  }
  .log-entry:hover { background: #0e141c; }
  .log-entry.evt-tube_triggered { border-left-color: var(--yellow); }
  .log-entry.evt-step_started { border-left-color: var(--cyan); }
  .log-entry.evt-step_completed { border-left-color: var(--green); }
  .log-entry.evt-step_failed { border-left-color: var(--red); }
  .log-entry.evt-tube_completed { border-left-color: var(--green); }
  .log-entry.evt-tube_stopped { border-left-color: var(--red); }

  .log-line1 { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .log-time { color: var(--text-mid); font-size: 11px; white-space: nowrap; min-width: 110px; }
  .log-event { font-weight: 600; white-space: nowrap; }
  .log-event.tube_triggered { color: var(--yellow); }
  .log-event.step_started { color: var(--cyan); }
  .log-event.step_completed { color: var(--green); }
  .log-event.step_failed { color: var(--red); }
  .log-event.tube_completed { color: var(--green); }
  .log-event.tube_stopped { color: var(--red); }
  .log-event.runner_started, .log-event.runner_stopped { color: var(--text-mid); }
  .log-summary { color: var(--text-bright); font-size: 12px; }
  .log-summary .val { color: var(--yellow); }

  .log-line2 { margin-top: 3px; margin-left: 120px; font-size: 11px; color: var(--text-mid); }
  .log-line2 .val { color: var(--text-bright); }
  .log-line2 .err { color: var(--red); }

  .log-empty { color: var(--text-mid); font-size: 13px; text-align: center; padding: 30px; }

  .footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg-main); border-top: 1px solid var(--border);
    padding: 8px 24px; display: flex; align-items: center;
    justify-content: space-between; font-size: 11px; color: var(--text-mid); z-index: 10;
  }
  .footer-left { display: flex; align-items: center; gap: 6px; }
</style>
</head>
<body>

<div class="header">
  <a href="/">← Home</a>
  <h1>Tube Dashboard</h1>
  <a href="https://intelligenism.club" target="_blank" class="brand-link">Intelligenism →</a>
</div>

<div class="container">
  <div class="toolbar">
    <span class="tube-count" id="tubeCount">Loading...</span>
    <div class="live-indicator">
      <span class="live-dot"></span>
      <span>polling every 10s</span>
    </div>
  </div>
  <div id="tubeList"></div>
</div>

<div class="footer">
  <div class="footer-left">
    <span class="live-dot" style="width:5px;height:5px;"></span>
    <span>Tube Runner Active</span>
  </div>
  <span id="footerRight">—</span>
</div>

<script>
const POLL = 10000, LOG_PER = 15;
let expanded = new Set(), tubes = [], logs = {};

async function api(url, opts) {
  try { const r = await fetch(url, opts); return await r.json(); } catch(e) { return {}; }
}
const fetchTubes = () => api('/api/tubes').then(d => d.tubes || []);
const fetchLogs  = () => api(`/api/tube/log/grouped?per_tube=${LOG_PER}`).then(d => d.groups || {});
const fireTube   = id => api('/api/tube/trigger', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tube_id:id})});
const clearLog   = id => api(`/api/tube/log?tube_id=${id}`, {method:'DELETE'});

function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function trunc(s,n) { return !s?'':s.length>n?s.slice(0,n)+'…':s; }

function triggersText(arr) {
  if (!arr||!arr.length) return '—';
  return arr.map(t => t.type==='cron'&&t.config?.expr ? `cron(${t.config.expr})` : t.type).join(' · ');
}

function renderStep(s, i) {
  const payload = s.payload || {};
  let details = '';
  const dr = (k,v) => `<div class="step-detail-row"><span class="step-detail-key">${k}:</span><span class="step-detail-val">${esc(String(v))}</span></div>`;

  if (s.type === 'agent') {
    details += dr('target', s.id||'—');
    if (s.mode) details += dr('mode', s.mode);
    if (payload.prompt) details += dr('prompt', payload.prompt);
  } else if (s.type === 'dispatch') {
    details += dr('strategy', s.id||'—');
    if (payload.message||payload.topic) details += dr('message', payload.message||payload.topic);
    if (payload.max_rounds) details += dr('max_rounds', payload.max_rounds);
  } else if (s.type === 'tube') {
    details += dr('target tube', s.id||'—');
  }
  for (const [k,v] of Object.entries(payload)) {
    if (['prompt','message','topic','max_rounds'].includes(k)) continue;
    details += dr(k, typeof v==='object'?JSON.stringify(v):v);
  }

  return `<div class="step-card">
    <div class="step-header">
      <span class="step-num">#${i+1}</span>
      <span class="step-type-badge step-type-${s.type}">${s.type}</span>
      <span class="step-target-name">${s.id||''}</span>
    </div>
    ${details?`<div class="step-details">${details}</div>`:''}
  </div>`;
}

function renderLog(e) {
  const ev = e.event||'';
  let summary = '';
  if (ev==='tube_triggered') summary = `<span class="val">${e.step_count||'?'}</span> step(s) queued`;
  else if (ev==='step_started') summary = `Step ${e.step_index} → <span class="val">${e.step_type||''} : ${e.target||''}</span>`;
  else if (ev==='step_completed') summary = `Step ${e.step_index} ✓  <span class="val">${e.duration_sec}s</span>`;
  else if (ev==='step_failed') summary = `Step ${e.step_index} ✗  exit=<span class="val">${e.exit_code??'?'}</span>  ${e.duration_sec||''}s`;
  else if (ev==='tube_completed') summary = `All steps done · <span class="val">${e.duration_sec}s total</span>`;
  else if (ev==='tube_stopped') summary = `Halted at step <span class="val">${e.stopped_at_step??'?'}</span> · ${e.duration_sec}s`;
  else if (ev==='runner_started') summary = `interval=<span class="val">${e.interval}s</span>`;

  let line2 = '';
  if (ev==='step_started' && e.payload) {
    const p = e.payload, pts = [];
    if (p.prompt) pts.push(`prompt: "${trunc(p.prompt,90)}"`);
    if (p.message||p.topic) pts.push(`message: "${trunc(p.message||p.topic,90)}"`);
    if (pts.length) line2 = `<span class="val">${esc(pts.join('  '))}</span>`;
  }
  if (ev==='step_failed') {
    if (e.error) line2 = `<span class="err">${esc(e.error)}</span>`;
    else if (e.stderr_tail) {
      const last = e.stderr_tail.split('\n').filter(l=>l.trim()).pop()||'';
      if (last) line2 = `<span class="err">${esc(last.trim().slice(0,150))}</span>`;
    }
  }

  return `<div class="log-entry evt-${ev}">
    <div class="log-line1">
      <span class="log-time">${fmtTime(e.timestamp)}</span>
      <span class="log-event ${ev}">${ev}</span>
      <span class="log-summary">${summary}</span>
    </div>
    ${line2?`<div class="log-line2">${line2}</div>`:''}
  </div>`;
}

function renderCard(tube) {
  const id=tube.id, en=tube.enabled!==false, st=tube.status||'idle', isE=expanded.has(id);
  let cc='tube-card'; if(!en)cc+=' is-disabled';else if(st==='running')cc+=' is-running';else cc+=' is-idle'; if(isE)cc+=' expanded';
  let bc='badge ',bt=''; if(!en){bc+='badge-disabled';bt='disabled';}else if(st==='running'){bc+='badge-running';bt='running';}else{bc+='badge-idle';bt='idle';}
  const tl=logs[id]||[];

  return `<div class="${cc}" id="card-${id}">
    <div class="tube-row" onclick="toggle('${id}')">
      <div class="tube-identity">
        <span class="tube-id">${id}</span>
        <span class="${bc}">${bt}</span>
        <span class="tube-triggers-brief">${(tube.triggers||[]).map(t=>t.type).join(' · ')}</span>
      </div>
      <div class="tube-actions">
        <button class="btn btn-fire" id="btn-${id}" onclick="event.stopPropagation();doFire('${id}')" ${!en?'disabled':''}>▶ Trigger</button>
        <span class="expand-icon">▶</span>
      </div>
    </div>
    <div class="tube-detail">
      <div class="detail-left">
        <div class="section-title">Configuration</div>
        <div class="config-grid">
          <span class="config-label">ID</span><span class="config-value">${id}</span>
          <span class="config-label">Enabled</span><span class="config-value ${en?'yes':'no'}">${en?'Yes':'No'}</span>
          <span class="config-label">Triggers</span><span class="config-value">${triggersText(tube.triggers)}</span>
          <span class="config-label">Steps</span><span class="config-value">${(tube.steps||[]).length} step(s)</span>
        </div>
        <div class="section-title">Steps</div>
        ${(tube.steps||[]).map(renderStep).join('')||'<div style="color:var(--text-mid);font-size:12px;">No steps</div>'}
        <div class="status-bar">
          <span class="status-dot ${st}"></span>
          <span class="status-text-${st}">${st.toUpperCase()}</span>
        </div>
      </div>
      <div class="detail-right">
        <div class="log-header">
          <div class="section-title" style="margin-bottom:0">Execution Log</div>
          <button class="btn btn-clear" onclick="doClear('${id}')">✕ Clear Log</button>
        </div>
        <div class="log-scroll" id="log-${id}">
          ${tl.length ? tl.map(renderLog).join('') : '<div class="log-empty">No log entries yet</div>'}
        </div>
      </div>
    </div>
  </div>`;
}

function render() {
  const list=document.getElementById('tubeList'), count=document.getElementById('tubeCount');
  if(!tubes.length){list.innerHTML='<div class="log-empty" style="padding:60px">No tubes defined — add entries to tube/tubes.json</div>';count.textContent='0 tubes';return;}
  const r=tubes.filter(t=>t.status==='running').length;
  count.innerHTML=`${tubes.length} tube${tubes.length>1?'s':''} · <strong>${r} running</strong>`;
  list.innerHTML=tubes.map(renderCard).join('');
  tubes.forEach(t=>{if(expanded.has(t.id)){const el=document.getElementById(`log-${t.id}`);if(el)el.scrollTop=el.scrollHeight;}});
  document.getElementById('footerRight').textContent=`Last refresh: ${new Date().toLocaleTimeString('en-GB')}`;
}

function toggle(id){expanded.has(id)?expanded.delete(id):expanded.add(id);render();}
async function doFire(id){const b=document.getElementById(`btn-${id}`);b.classList.add('firing');b.textContent='● Firing...';await fireTube(id);setTimeout(()=>{b.classList.remove('firing');b.textContent='▶ Trigger';},1500);setTimeout(refresh,2000);}
async function doClear(id){if(!confirm(`Clear all log entries for "${id}"?`))return;await clearLog(id);await refresh();}
async function refresh(){[tubes,logs]=await Promise.all([fetchTubes(),fetchLogs()]);render();}
refresh();setInterval(refresh,POLL);
</script>
</body>
</html>
