<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1v1 AGENT Chat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Press Start 2P', monospace;
    background: #0a0a1a;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    image-rendering: pixelated;
  }

  /* ── Header ── */
  #header {
    padding: 14px 20px;
    background: #0f1428;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 4px solid #33ff99;
  }
  #nav-home {
    color: #ffcc00;
    text-decoration: none;
    font-size: 12px;
    padding: 6px 12px;
    border: 2px solid #ffcc00;
    transition: all 0.15s;
    text-shadow: 0 0 6px rgba(255,204,0,0.3);
  }
  #nav-home:hover {
    background: rgba(255,204,0,0.15);
    transform: translate(-1px, -1px);
    box-shadow: 2px 2px 0 rgba(255,204,0,0.3);
  }
  #header h1 {
    font-size: 16px;
    color: #33ff99;
    flex: 1;
    text-shadow: 2px 2px 0 #0a4a2a, 0 0 12px rgba(51,255,153,0.3);
  }
  #agent-select {
    font-family: 'Press Start 2P', monospace;
    background: #0a0a1a;
    color: #00ccff;
    border: 3px solid #4444aa;
    padding: 8px 12px;
    font-size: 11px;
    cursor: pointer;
    text-shadow: 0 0 6px rgba(0,204,255,0.3);
  }
  #agent-select:focus { outline: none; border-color: #33ff99; }
  #agent-select option { background: #0a0a1a; color: #00ccff; }

  #clear-btn {
    font-family: 'Press Start 2P', monospace;
    background: #111130;
    color: #ff6666;
    border: 3px solid #ff6666;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 11px;
    transition: all 0.15s;
    text-shadow: 0 0 6px rgba(255,102,102,0.3);
  }
  #clear-btn:hover {
    background: rgba(255,102,102,0.15);
    transform: translate(-1px, -1px);
    box-shadow: 2px 2px 0 rgba(255,102,102,0.3);
  }

  /* ── Chat area ── */
  #chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  #chat-area::-webkit-scrollbar { width: 8px; }
  #chat-area::-webkit-scrollbar-track { background: #0a0a1a; }
  #chat-area::-webkit-scrollbar-thumb { background: #4444aa; }

  /* ── Messages — use system font for readability ── */
  .msg {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: #0f3460;
    color: #e0e0e0;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: #222244;
    color: #e0e0e0;
    border-bottom-left-radius: 4px;
  }
  .msg.error {
    align-self: flex-start;
    background: #3d1f1f;
    color: #ff8080;
  }

  /* ── Loading ── */
  #loading {
    display: none;
    align-self: flex-start;
    padding: 14px 18px;
    color: #ffcc00;
    font-size: 12px;
    text-shadow: 0 0 8px rgba(255,204,0,0.4);
  }
  #loading.show { display: block; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  #loading.show { animation: blink 1.2s infinite; }

  /* ── Input area ── */
  #input-area {
    padding: 16px 20px;
    background: #0f1428;
    border-top: 4px solid #33ff99;
    display: flex;
    gap: 12px;
  }
  #message-input {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    flex: 1;
    background: #1a1a2e;
    color: #e0e0e0;
    border: 1px solid #2a2a4a;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
    resize: none;
    height: 44px;
  }
  #message-input:focus { outline: none; border-color: #4a4a7a; }
  #message-input::placeholder { color: #444466; }

  #send-btn {
    font-family: 'Press Start 2P', monospace;
    background: #0a3a2a;
    color: #33ff99;
    border: 3px solid #33ff99;
    padding: 12px 24px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
    text-shadow: 0 0 8px rgba(51,255,153,0.4);
  }
  #send-btn:hover {
    background: rgba(51,255,153,0.2);
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 rgba(51,255,153,0.3);
  }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }

  .no-agents {
    color: #666688;
    text-align: center;
    padding: 40px;
    font-size: 11px;
    line-height: 2.5;
  }
</style>
</head>
<body>

<div id="header">
  <a id="nav-home" href="/">◀ INDEX</a>
  <h1>1v1 AGENT Chat</h1>
  <select id="agent-select"></select>
  <button id="clear-btn" onclick="clearChat()">NEW CHAT</button>
</div>

<div id="chat-area">
  <div id="loading">▶ Thinking...</div>
</div>

<div id="input-area">
  <textarea id="message-input" placeholder="Type a message..." onkeydown="handleKey(event)"></textarea>
  <button id="send-btn" onclick="sendMessage()">SEND</button>
</div>

<script>
const chatArea = document.getElementById('chat-area');
const input = document.getElementById('message-input');
const sendBtn = document.getElementById('send-btn');
const loading = document.getElementById('loading');
const agentSelect = document.getElementById('agent-select');

function getAgentId() {
  return agentSelect.value;
}

function appendMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatArea.insertBefore(div, loading);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div;
}

async function loadAgents() {
  try {
    const response = await fetch('/api/agents');
    const agents = await response.json();
    agentSelect.innerHTML = '';

    if (agents.length === 0) {
      agentSelect.innerHTML = '<option value="">No agents found</option>';
      const notice = document.createElement('div');
      notice.className = 'no-agents';
      notice.textContent = 'No agents found. Copy template/ to agents/your_agent/ to create one.';
      chatArea.insertBefore(notice, loading);
      return;
    }

    agents.forEach(a => {
      const opt = document.createElement('option');
      opt.value = a.id;
      opt.textContent = `${a.display_name} (${a.model})`;
      agentSelect.appendChild(opt);
    });

    loadHistory();
  } catch (err) {
    agentSelect.innerHTML = '<option value="">Error loading agents</option>';
  }
}

async function sendMessage() {
  const message = input.value.trim();
  const agentId = getAgentId();
  if (!message || !agentId) return;

  input.value = '';
  sendBtn.disabled = true;

  appendMessage('user', message);
  loading.className = 'show';
  chatArea.scrollTop = chatArea.scrollHeight;

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agent_id: agentId, message })
    });

    const data = await response.json();
    loading.className = '';

    if (data.error) {
      appendMessage('error', `Error: ${data.error}`);
    } else {
      appendMessage('assistant', data.reply);
    }
  } catch (err) {
    loading.className = '';
    appendMessage('error', `Connection error: ${err.message}`);
  }

  sendBtn.disabled = false;
  input.focus();
}

async function clearChat() {
  const agentId = getAgentId();
  if (!agentId) return;
  await fetch(`/api/history/${agentId}`, { method: 'DELETE' });
  const msgs = chatArea.querySelectorAll('.msg');
  msgs.forEach(m => m.remove());
}

async function loadHistory() {
  const agentId = getAgentId();
  if (!agentId) return;

  const msgs = chatArea.querySelectorAll('.msg, .no-agents');
  msgs.forEach(m => m.remove());

  try {
    const response = await fetch(`/api/history/${agentId}`);
    const messages = await response.json();
    if (Array.isArray(messages)) {
      messages.forEach(m => appendMessage(m.role, m.content));
    }
  } catch (err) {}
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

agentSelect.addEventListener('change', loadHistory);
loadAgents();
input.focus();
</script>

</body>
</html>
