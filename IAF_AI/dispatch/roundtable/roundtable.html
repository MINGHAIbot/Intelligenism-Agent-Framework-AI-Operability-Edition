<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roundtable Discussion</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

        :root {
            --bg-deep: #0c0c18;
            --bg-surface: #141428;
            --bg-card: #1a1a32;
            --bg-card-hover: #22224a;
            --border-dim: #2a2a4a;
            --border-glow: #00e5a0;
            --text-bright: #f5f5f0;
            --text-primary: #e0e0e8;
            --text-secondary: #8888a0;
            --text-dim: #7777a0;
            --accent-cyan: #00e5a0;
            --accent-gold: #f0c866;
            --accent-blue: #5b8def;
            --accent-pink: #e06090;
            --bold-color: #ffd866;
            --font-pixel: 'VT323', monospace;
            --font-mono: 'Share Tech Mono', 'IBM Plex Mono', monospace;
            --font-body: 'IBM Plex Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-deep);
            color: var(--text-bright);
            font-family: var(--font-body);
            font-size: 1rem;
            line-height: 1.7;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
            pointer-events: none;
            z-index: 9999;
        }

        /* --- Top Bar --- */
        .top-bar {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-dim);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 18px;
        }
        .top-bar-left a {
            font-family: var(--font-mono);
            font-size: 0.95rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }
        .top-bar-left a:hover { color: var(--accent-cyan); }
        .top-bar-title {
            font-family: var(--font-pixel);
            font-size: 2.6rem;
            color: var(--accent-cyan);
            text-shadow: 0 0 16px rgba(0, 229, 160, 0.35);
            letter-spacing: 2px;
        }
        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .top-bar-right a {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-decoration: none;
        }
        .top-bar-right a:hover { color: var(--accent-cyan); }

        /* --- Main Layout --- */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 280px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border-dim);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-dim);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sidebar-header h3 {
            font-family: var(--font-pixel);
            font-size: 1.3rem;
            color: var(--accent-gold);
        }
        .btn-new {
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            padding: 5px 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-new:hover {
            background: rgba(0, 229, 160, 0.1);
            box-shadow: 0 0 8px rgba(0, 229, 160, 0.2);
        }

        /* --- Agent Info Panel --- */
        .agent-info-panel {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-dim);
        }
        .agent-info-panel h4 {
            font-family: var(--font-pixel);
            font-size: 1.1rem;
            color: var(--accent-gold);
            margin-bottom: 10px;
        }
        .agent-info-card {
            padding: 10px 12px;
            margin-bottom: 8px;
            background: var(--bg-card);
            border-left: 3px solid var(--border-dim);
        }
        .agent-info-card.agent-strategist { border-left-color: var(--accent-cyan); }
        .agent-info-card.agent-critic { border-left-color: var(--accent-pink); }
        .agent-info-name {
            font-family: var(--font-pixel);
            font-size: 1.1rem;
            margin-bottom: 2px;
        }
        .agent-info-name.strategist { color: var(--accent-cyan); }
        .agent-info-name.critic { color: var(--accent-pink); }
        .agent-info-detail {
            font-family: var(--font-mono);
            font-size: 0.82rem;
            color: var(--text-primary);
            line-height: 1.6;
        }
        .agent-info-id {
            color: var(--accent-gold);
        }

        /* --- Session List --- */
        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .session-list-title {
            padding: 10px 8px 6px;
            font-family: var(--font-pixel);
            font-size: 1.05rem;
            color: var(--accent-gold);
        }
        .session-item {
            padding: 10px 12px;
            margin-bottom: 4px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .session-item-info {
            flex: 1;
            min-width: 0;
        }
        .session-item:hover {
            background: var(--bg-card);
            border-color: var(--border-dim);
        }
        .session-item.active {
            background: var(--bg-card);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 6px rgba(0, 229, 160, 0.15);
        }
        .session-item .session-date {
            font-family: var(--font-mono);
            font-size: 0.82rem;
            color: var(--text-primary);
        }
        .session-item .session-preview {
            font-size: 0.85rem;
            color: var(--text-primary);
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .btn-delete {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-dim);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            padding: 2px 6px;
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .session-item:hover .btn-delete {
            opacity: 1;
        }
        .btn-delete:hover {
            color: var(--accent-pink);
            border-color: var(--accent-pink);
        }

        /* --- Chat Area --- */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Config Bar --- */
        .config-bar {
            padding: 10px 24px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-dim);
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }
        .config-bar label {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .config-bar input[type="number"] {
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            color: var(--text-bright);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            padding: 4px 8px;
            width: 50px;
            text-align: center;
        }
        .config-bar input[type="number"]:focus {
            outline: none;
            border-color: var(--accent-cyan);
        }
        .agent-badges {
            display: flex;
            gap: 10px;
        }
        .agent-badge {
            font-family: var(--font-pixel);
            font-size: 1rem;
            padding: 3px 14px;
            border: 1px solid var(--border-dim);
            background: var(--bg-card);
        }
        .agent-badge.strategist { color: var(--accent-cyan); border-color: rgba(0,229,160,0.3); }
        .agent-badge.critic { color: var(--accent-pink); border-color: rgba(224,96,144,0.3); }

        /* --- Messages --- */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            scroll-behavior: smooth;
        }
        .messages::-webkit-scrollbar { width: 6px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 3px; }

        .msg {
            margin-bottom: 20px;
            animation: msgFadeIn 0.3s ease;
        }
        @keyframes msgFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .msg-author {
            font-family: var(--font-pixel);
            font-size: 1.3rem;
            letter-spacing: 0.5px;
        }
        .msg-author.user { color: var(--accent-gold); }
        .msg-author.strategist { color: var(--accent-cyan); }
        .msg-author.critic { color: var(--accent-pink); }
        .msg-round {
            font-family: var(--font-mono);
            font-size: 0.78rem;
            color: var(--text-dim);
            padding: 2px 8px;
            border: 1px solid var(--border-dim);
        }
        .msg-tools {
            font-family: var(--font-mono);
            font-size: 0.78rem;
            color: var(--accent-blue);
        }

        .msg-body {
            font-family: var(--font-body);
            font-size: 0.95rem;
            color: var(--text-primary);
            line-height: 1.85;
            padding: 14px 18px;
            border-left: 3px solid var(--border-dim);
            margin-left: 4px;
        }
        .msg-body.user-body {
            border-left-color: var(--accent-gold);
            background: rgba(240, 200, 102, 0.04);
        }
        .msg-body.strategist-body {
            border-left-color: var(--accent-cyan);
            background: rgba(0, 229, 160, 0.03);
        }
        .msg-body.critic-body {
            border-left-color: var(--accent-pink);
            background: rgba(224, 96, 144, 0.03);
        }

        .round-divider {
            text-align: center;
            margin: 24px 0;
            position: relative;
        }
        .round-divider::before {
            content: '';
            position: absolute;
            left: 0; right: 0; top: 50%;
            border-top: 1px solid var(--border-dim);
        }
        .round-divider span {
            background: var(--bg-deep);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-dim);
            padding: 0 14px;
            position: relative;
        }

        /* --- Welcome Screen --- */
        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        .welcome h2 {
            font-family: var(--font-pixel);
            font-size: 2.4rem;
            color: var(--accent-cyan);
            text-shadow: 0 0 20px rgba(0, 229, 160, 0.3);
            margin-bottom: 16px;
        }
        .welcome p {
            font-size: 1rem;
            color: var(--text-secondary);
            max-width: 520px;
            text-align: center;
            line-height: 1.8;
        }
        .welcome .hint {
            margin-top: 24px;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        /* --- Input Area --- */
        .input-area {
            padding: 16px 24px;
            background: var(--bg-surface);
            border-top: 1px solid var(--border-dim);
            display: flex;
            gap: 12px;
            flex-shrink: 0;
        }
        .input-area textarea {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            color: var(--text-bright);
            font-family: var(--font-body);
            font-size: 1rem;
            padding: 12px 16px;
            resize: none;
            line-height: 1.7;
            min-height: 48px;
            max-height: 180px;
        }
        .input-area textarea:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 8px rgba(0, 229, 160, 0.15);
        }
        .input-area textarea::placeholder {
            color: var(--text-dim);
        }
        .btn-send {
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            font-family: var(--font-pixel);
            font-size: 1.3rem;
            padding: 10px 24px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            align-self: flex-end;
        }
        .btn-send:hover {
            background: rgba(0, 229, 160, 0.1);
            box-shadow: 0 0 12px rgba(0, 229, 160, 0.25);
        }
        .btn-send:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* --- Loading --- */
        .loading-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 18px;
            margin-bottom: 20px;
        }
        .loading-dots {
            display: flex;
            gap: 5px;
        }
        .loading-dots span {
            width: 7px;
            height: 7px;
            background: var(--accent-cyan);
            border-radius: 50%;
            animation: dotPulse 1.2s ease-in-out infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes dotPulse {
            0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1); }
        }
        .loading-text {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        /* --- Status Bar --- */
        .status-bar {
            padding: 5px 24px;
            background: var(--bg-deep);
            border-top: 1px solid var(--border-dim);
            font-family: var(--font-mono);
            font-size: 0.78rem;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        /* --- Responsive --- */
        @media (max-width: 700px) {
            .sidebar { display: none; }
            .top-bar-title { font-size: 1.3rem; }
            .config-bar { flex-wrap: wrap; gap: 8px; }
            .messages { padding: 14px; }
        }
    </style>
</head>
<body>

    <!-- Top Bar -->
    <div class="top-bar">
        <div class="top-bar-left">
            <a href="/">← Home</a>
            <span class="top-bar-title" id="pageTitle">Roundtable</span>
        </div>
        <div class="top-bar-right">
            <a href="https://intelligenism.org" target="_blank" rel="noopener">
                📖 Intelligenism ↗
            </a>
        </div>
    </div>

    <div class="main-layout">

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>Sessions</h3>
                <button class="btn-new" onclick="createNewSession()">+ New</button>
            </div>

            <!-- Agent Info Panel -->
            <div class="agent-info-panel" id="agentInfoPanel">
                <h4>Participants</h4>
                <div id="agentInfoCards">
                    <!-- populated by JS -->
                </div>
            </div>

            <!-- Session List -->
            <div class="session-list">
                <div class="session-list-title">History</div>
                <div id="sessionList"></div>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <!-- Config Bar -->
            <div class="config-bar">
                <div class="agent-badges" id="agentBadges">
                    <!-- populated by JS -->
                </div>
                <label>Rounds <input type="number" id="roundsInput" value="3" min="1" max="10"></label>
            </div>

            <!-- Messages or Welcome -->
            <div class="messages" id="messagesArea">
                <div class="welcome" id="welcomeScreen">
                    <h2>Roundtable Discussion</h2>
                    <p>Start a multi-agent discussion. Pose a question or proposal, and your agents will debate it from their assigned perspectives.</p>
                    <p class="hint">Click "+ New" or type below to begin</p>
                </div>
            </div>

            <!-- Input -->
            <div class="input-area">
                <textarea id="userInput" placeholder="Type your question or proposal..." rows="1"
                    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
                <button class="btn-send" id="sendBtn" onclick="sendMessage()">Send ▸</button>
            </div>

            <!-- Status Bar -->
            <div class="status-bar">
                <span id="statusLeft">No active session</span>
                <span id="statusRight">Ready</span>
            </div>
        </div>
    </div>

<script>
    // -----------------------------------------------------------------------
    // State
    // -----------------------------------------------------------------------
    const API_BASE = '/api/dispatch/roundtable';
    let currentSessionId = null;
    let isProcessing = false;
    let dispatchConfig = null;

    // Agent color mapping — extendable for more agents
    const AGENT_COLORS = {
        'default':  { class: 'strategist', color: 'var(--accent-cyan)' },
        'agent2':   { class: 'critic',     color: 'var(--accent-pink)' },
    };

    function getAgentStyle(agentId) {
        return AGENT_COLORS[agentId] || { class: 'strategist', color: 'var(--accent-cyan)' };
    }

    // -----------------------------------------------------------------------
    // Load Config & Agent Info
    // -----------------------------------------------------------------------
    async function loadConfig() {
        try {
            const resp = await fetch(`${API_BASE}/config`);
            dispatchConfig = await resp.json();

            // Render agent badges in config bar
            const badges = document.getElementById('agentBadges');
            badges.innerHTML = '';
            const turnOrder = dispatchConfig.turn_order || Object.keys(dispatchConfig.agents);
            turnOrder.forEach(agentId => {
                const agent = dispatchConfig.agents[agentId];
                const style = getAgentStyle(agentId);
                const badge = document.createElement('span');
                badge.className = `agent-badge ${style.class}`;
                badge.textContent = agent.display_name;
                badges.appendChild(badge);
            });

            // Set page title from config
            document.getElementById('pageTitle').textContent = dispatchConfig.display_name || 'Roundtable';
            document.title = dispatchConfig.display_name || 'Roundtable Discussion';

            // Set rounds input
            document.getElementById('roundsInput').value = dispatchConfig.max_rounds || 3;

            // Render agent info cards in sidebar
            const cards = document.getElementById('agentInfoCards');
            cards.innerHTML = '';
            turnOrder.forEach(agentId => {
                const agent = dispatchConfig.agents[agentId];
                const style = getAgentStyle(agentId);
                const contextFiles = agent.context_files || [];
                const fileCount = contextFiles.length;

                const card = document.createElement('div');
                card.className = `agent-info-card agent-${style.class}`;
                card.innerHTML = `
                    <div class="agent-info-name ${style.class}">${agent.display_name}</div>
                    <div class="agent-info-detail">
                        <span class="agent-info-id">ID: ${agentId}</span><br>
                        Provider: ${agent.provider}<br>
                        Model: ${agent.model}<br>
                        Context files: ${fileCount}
                    </div>
                `;
                cards.appendChild(card);
            });
        } catch (e) {
            console.error('Failed to load config:', e);
        }
    }

    // -----------------------------------------------------------------------
    // Session Management
    // -----------------------------------------------------------------------
    async function createNewSession() {
        try {
            const resp = await fetch(`${API_BASE}/sessions`, { method: 'POST' });
            const data = await resp.json();
            currentSessionId = data.session_id;
            clearMessages();
            showWelcome(false);
            updateStatus(`Session: ${currentSessionId.substring(0, 19)}`);
            await loadSessionList();
        } catch (e) {
            console.error('Failed to create session:', e);
        }
    }

    async function loadSessionList() {
        try {
            const resp = await fetch(`${API_BASE}/sessions`);
            const data = await resp.json();
            renderSessionList(data.sessions);
        } catch (e) {
            console.error('Failed to load sessions:', e);
        }
    }

    function renderSessionList(sessions) {
        const list = document.getElementById('sessionList');
        list.innerHTML = '';
        sessions.forEach(sid => {
            const item = document.createElement('div');
            item.className = 'session-item' + (sid === currentSessionId ? ' active' : '');
            const datePart = sid.substring(0, 15);
            item.innerHTML = `
                <div class="session-item-info">
                    <div class="session-date">${datePart}</div>
                    <div class="session-preview">${sid}</div>
                </div>
                <button class="btn-delete" title="Delete session">✕</button>
            `;
            item.querySelector('.session-item-info').onclick = () => loadSession(sid);
            item.querySelector('.btn-delete').onclick = (e) => {
                e.stopPropagation();
                deleteSession(sid);
            };
            list.appendChild(item);
        });
    }

    async function deleteSession(sessionId) {
        if (!confirm('Delete this session?')) return;
        try {
            const resp = await fetch(`${API_BASE}/sessions/${sessionId}`, { method: 'DELETE' });
            const data = await resp.json();
            if (data.error) {
                appendSystemMessage(`Delete error: ${data.error}`);
                return;
            }
            // If we deleted the active session, clear the chat
            if (sessionId === currentSessionId) {
                currentSessionId = null;
                clearMessages();
                showWelcome(true);
                updateStatus('No active session');
            }
            await loadSessionList();
        } catch (e) {
            appendSystemMessage(`Delete error: ${e.message}`);
        }
    }

    async function loadSession(sessionId) {
        currentSessionId = sessionId;
        clearMessages();
        showWelcome(false);
        updateStatus(`Session: ${sessionId.substring(0, 19)}`);

        try {
            const resp = await fetch(`${API_BASE}/sessions/${sessionId}`);
            const data = await resp.json();
            renderSessionRecords(data.records);
            await loadSessionList();
        } catch (e) {
            console.error('Failed to load session:', e);
        }
    }

    // -----------------------------------------------------------------------
    // Message Sending
    // -----------------------------------------------------------------------
    async function sendMessage() {
        if (isProcessing) return;

        const input = document.getElementById('userInput');
        const message = input.value.trim();
        if (!message) return;

        if (!currentSessionId) {
            await createNewSession();
        }

        input.value = '';
        autoResizeTextarea(input);
        showWelcome(false);

        appendUserMessage(message);

        isProcessing = true;
        updateSendButton(false);
        updateStatusRight('Waiting for agents...');
        const loadingEl = showLoading();
        let agentCount = 0;

        try {
            const resp = await fetch(`${API_BASE}/sessions/${currentSessionId}/chat/stream`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message,
                    max_rounds: parseInt(document.getElementById('roundsInput').value) || 3,
                }),
            });

            if (!resp.ok) {
                const err = await resp.json();
                removeLoading(loadingEl);
                appendSystemMessage(`Error: ${err.error || resp.statusText}`);
                isProcessing = false;
                updateSendButton(true);
                updateStatusRight('Ready');
                return;
            }

            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });

                // Parse SSE events from buffer
                const lines = buffer.split('\n');
                buffer = lines.pop(); // keep incomplete line in buffer

                let eventType = 'message';
                for (const line of lines) {
                    if (line.startsWith('event: ')) {
                        eventType = line.substring(7).trim();
                    } else if (line.startsWith('data: ')) {
                        const dataStr = line.substring(6);
                        try {
                            const data = JSON.parse(dataStr);
                            handleSSEEvent(eventType, data, loadingEl);
                            agentCount++;
                            if (eventType === 'agent_response') {
                                updateStatusRight(`Agent ${agentCount} responded...`);
                            }
                        } catch (e) {
                            console.warn('SSE parse error:', e, dataStr);
                        }
                        eventType = 'message'; // reset
                    }
                }
            }
        } catch (e) {
            removeLoading(loadingEl);
            appendSystemMessage(`Connection error: ${e.message}`);
        }

        isProcessing = false;
        updateSendButton(true);
        updateStatusRight('Ready');
        await loadSessionList();
    }

    let lastSSERound = 0;

    function handleSSEEvent(eventType, data, loadingEl) {
        if (eventType === 'session') {
            currentSessionId = data.session_id;
            updateStatus(`Session: ${data.session_id.substring(0, 19)}`);

        } else if (eventType === 'agent_response') {
            // Remove loading on first agent response
            removeLoading(loadingEl);

            // Add round divider if new round
            if (data.round > lastSSERound && lastSSERound > 0) {
                const area = document.getElementById('messagesArea');
                const divider = document.createElement('div');
                divider.className = 'round-divider';
                divider.innerHTML = `<span>End of Round ${lastSSERound}</span>`;
                area.appendChild(divider);
            }
            lastSSERound = data.round;

            // Render agent message
            const area = document.getElementById('messagesArea');
            const style = getAgentStyle(data.agent_id);
            const msg = document.createElement('div');
            msg.className = 'msg';

            let headerExtra = `<span class="msg-round">Round ${data.round}</span>`;
            if (data.tools_used) {
                headerExtra += `<span class="msg-tools">🔧 ${data.tools_used} tool(s)</span>`;
            }

            msg.innerHTML = `
                <div class="msg-header">
                    <span class="msg-author ${style.class}">${escapeHtml(data.display_name)}</span>
                    ${headerExtra}
                </div>
                <div class="msg-body ${style.class}-body">${formatContent(data.content)}</div>
            `;
            area.appendChild(msg);
            scrollToBottom();

        } else if (eventType === 'round_complete') {
            const area = document.getElementById('messagesArea');
            const divider = document.createElement('div');
            divider.className = 'round-divider';
            divider.innerHTML = `<span>End of Round ${data.round}</span>`;
            area.appendChild(divider);
            lastSSERound = data.round;
            scrollToBottom();

        } else if (eventType === 'done') {
            removeLoading(loadingEl);
            lastSSERound = 0;

        } else if (eventType === 'error') {
            removeLoading(loadingEl);
            appendSystemMessage(`Error: ${data.message}`);
        }
    }

    // -----------------------------------------------------------------------
    // Rendering
    // -----------------------------------------------------------------------
    function appendUserMessage(content) {
        const area = document.getElementById('messagesArea');
        const msg = document.createElement('div');
        msg.className = 'msg';
        msg.innerHTML = `
            <div class="msg-header">
                <span class="msg-author user">You</span>
            </div>
            <div class="msg-body user-body">${escapeHtml(content)}</div>
        `;
        area.appendChild(msg);
        scrollToBottom();
    }

    function renderResponses(responses) {
        const area = document.getElementById('messagesArea');
        let lastRound = 0;

        responses.forEach(r => {
            if (r.round > lastRound) {
                if (lastRound > 0) {
                    const divider = document.createElement('div');
                    divider.className = 'round-divider';
                    divider.innerHTML = `<span>End of Round ${lastRound}</span>`;
                    area.appendChild(divider);
                }
                lastRound = r.round;
            }

            const style = getAgentStyle(r.agent_id);
            const msg = document.createElement('div');
            msg.className = 'msg';

            let headerExtra = `<span class="msg-round">Round ${r.round}</span>`;
            if (r.tools_used) {
                headerExtra += `<span class="msg-tools">🔧 ${r.tools_used} tool(s)</span>`;
            }

            msg.innerHTML = `
                <div class="msg-header">
                    <span class="msg-author ${style.class}">${escapeHtml(r.display_name)}</span>
                    ${headerExtra}
                </div>
                <div class="msg-body ${style.class}-body">${formatContent(r.content)}</div>
            `;
            area.appendChild(msg);
        });

        if (lastRound > 0) {
            const divider = document.createElement('div');
            divider.className = 'round-divider';
            divider.innerHTML = `<span>End of Round ${lastRound}</span>`;
            area.appendChild(divider);
        }

        scrollToBottom();
    }

    function renderSessionRecords(records) {
        const area = document.getElementById('messagesArea');
        let lastRound = 0;

        records.forEach(r => {
            if (r.type === 'user_input') {
                appendUserMessage(r.content);
            } else if (r.type === 'agent_response') {
                if (r.round > lastRound && lastRound > 0) {
                    const divider = document.createElement('div');
                    divider.className = 'round-divider';
                    divider.innerHTML = `<span>End of Round ${lastRound}</span>`;
                    area.appendChild(divider);
                }
                lastRound = r.round;

                const style = getAgentStyle(r.agent_id);
                const msg = document.createElement('div');
                msg.className = 'msg';
                msg.innerHTML = `
                    <div class="msg-header">
                        <span class="msg-author ${style.class}">${escapeHtml(r.display_name)}</span>
                        <span class="msg-round">Round ${r.round}</span>
                    </div>
                    <div class="msg-body ${style.class}-body">${formatContent(r.content)}</div>
                `;
                area.appendChild(msg);
            } else if (r.type === 'round_complete') {
                const divider = document.createElement('div');
                divider.className = 'round-divider';
                divider.innerHTML = `<span>End of Round ${r.round}</span>`;
                area.appendChild(divider);
                lastRound = r.round;
            }
        });

        scrollToBottom();
    }

    function appendSystemMessage(text) {
        const area = document.getElementById('messagesArea');
        const msg = document.createElement('div');
        msg.className = 'msg';
        msg.innerHTML = `
            <div class="msg-header">
                <span class="msg-author" style="color:var(--accent-pink);">System</span>
            </div>
            <div class="msg-body" style="border-left-color:var(--accent-pink);color:var(--text-secondary);">
                ${escapeHtml(text)}
            </div>
        `;
        area.appendChild(msg);
        scrollToBottom();
    }

    function showLoading() {
        const area = document.getElementById('messagesArea');
        const el = document.createElement('div');
        el.className = 'loading-indicator';
        el.innerHTML = `
            <div class="loading-dots"><span></span><span></span><span></span></div>
            <span class="loading-text">Agents are discussing...</span>
        `;
        area.appendChild(el);
        scrollToBottom();
        return el;
    }

    function removeLoading(el) {
        if (el && el.parentNode) el.parentNode.removeChild(el);
    }

    // -----------------------------------------------------------------------
    // Helpers
    // -----------------------------------------------------------------------
    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function formatContent(text) {
        let html = escapeHtml(text);
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong style="color:var(--bold-color)">$1</strong>');
        html = html.replace(/\n\n/g, '</p><p>');
        html = html.replace(/\n/g, '<br>');
        return `<p>${html}</p>`;
    }

    function clearMessages() {
        document.getElementById('messagesArea').innerHTML = '';
    }

    function showWelcome(show) {
        const area = document.getElementById('messagesArea');
        const existing = document.getElementById('welcomeScreen');
        if (show && !existing) {
            area.innerHTML = `
                <div class="welcome" id="welcomeScreen">
                    <h2>Roundtable Discussion</h2>
                    <p>Start a multi-agent discussion. Pose a question or proposal, and your agents will debate it from their assigned perspectives.</p>
                    <p class="hint">Click "+ New" or type below to begin</p>
                </div>
            `;
        } else if (!show && existing) {
            existing.remove();
        }
    }

    function scrollToBottom() {
        const area = document.getElementById('messagesArea');
        area.scrollTop = area.scrollHeight;
    }

    function updateStatus(text) {
        document.getElementById('statusLeft').textContent = text;
    }

    function updateStatusRight(text) {
        document.getElementById('statusRight').textContent = text;
    }

    function updateSendButton(enabled) {
        document.getElementById('sendBtn').disabled = !enabled;
    }

    const textarea = document.getElementById('userInput');
    textarea.addEventListener('input', function() { autoResizeTextarea(this); });

    function autoResizeTextarea(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 180) + 'px';
    }

    // -----------------------------------------------------------------------
    // Init
    // -----------------------------------------------------------------------
    loadConfig();
    loadSessionList();
</script>

</body>
</html>
